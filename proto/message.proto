// proto/message.proto - Protocol message definitions for mini-ibus
syntax = "proto3";

package minibus.proto;

// Business process registration with local ibusd
message RegisterPayload {
  uint32 my_address = 1;
  repeated uint32 services = 2;  // service IDs this process provides
  repeated uint32 topics = 3;    // topic IDs this process subscribes to
}

// RPC request sent from caller to callee
message RpcRequest {
  uint32 service_id = 1;
  uint32 method_id = 2;
  uint64 sequence = 3;   // sequence number for matching response
  bytes args = 4;        // business-specific protobuf payload
}

// RPC response sent back to caller
message RpcResponse {
  uint64 sequence = 1;
  int32 status = 2;      // 0 = success, negative = ErrorCode
  bytes result = 3;      // business-specific protobuf payload
}

// Pub/Sub message published to a topic
message PublishPayload {
  uint32 topic_id = 1;
  bytes data = 2;
}

// Subscription registration for a topic
message SubscribePayload {
  uint32 client_addr = 1;
  uint32 topic_id = 2;
  bool unsubscribe = 3;  // true = unsubscribe, false = subscribe
}

// Heartbeat between ibusd peers
message HeartbeatPayload {
  uint64 timestamp_us = 1;
  uint32 seq = 2;
}
